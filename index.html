  <script>
        lucide.createIcons();

        const $ = id => document.getElementById(id);
        const slots = { m1:$('m1'),m2:$('m2'),m3:$('m3'),r1a:$('r1a'),r1b:$('r1b'),r2a:$('r2a'),r2b:$('r2b'),r3a:$('r3a') };
        const result = { manual:'', roll1:'', roll2:'', roll3:'' };

        function randDigit() { return Math.floor(Math.random()*10).toString(); }

        function animateSlots(els, cb) {
            const intervals = els.map(el => {
                el.classList.add('spinning');
                el.classList.remove('text-slate-600');
                return setInterval(() => { el.innerText = randDigit(); }, 40);
            });
            els.forEach((el, i) => {
                setTimeout(() => {
                    clearInterval(intervals[i]);
                    el.innerText = randDigit();
                    el.classList.remove('spinning');
                    el.classList.add('locked');
                    if (i === els.length - 1) setTimeout(() => cb(els.map(e=>e.innerText).join('')), 300);
                }, 1000 + i * 800);
            });
        }

        $('btnLock').addEventListener('click', () => {
            const v = $('manualInput').value;
            if (v.length !== 3) return;
            result.manual = v;
            [slots.m1,slots.m2,slots.m3].forEach((el,i) => {
                el.innerText = v[i];
                el.classList.remove('text-slate-600');
                el.classList.add('locked');
            });
            $('manualInput').disabled = true;
            $('btnLock').disabled = true;
            $('btnRoll1').disabled = false;
        });

        $('manualInput').addEventListener('keypress', e => { if(e.key==='Enter') $('btnLock').click(); });

        $('btnRoll1').addEventListener('click', () => {
            $('btnRoll1').disabled = true;
            animateSlots([slots.r1a, slots.r1b], r => { result.roll1=r; $('btnRoll2').disabled=false; });
        });

        $('btnRoll2').addEventListener('click', () => {
            $('btnRoll2').disabled = true;
            animateSlots([slots.r2a, slots.r2b], r => { result.roll2=r; $('btnRoll3').disabled=false; });
        });

        $('btnRoll3').addEventListener('click', () => {
            $('btnRoll3').disabled = true;
            animateSlots([slots.r3a], r => {
                result.roll3 = r;
                const area = $('result-area');
                $('result-number').innerText = `${result.manual} - ${result.roll1} - ${result.roll2} - ${result.roll3}`;
                area.classList.remove('hidden');
                setTimeout(() => { area.classList.remove('opacity-0'); area.classList.add('opacity-100'); startConfetti(); }, 50);
            });
        });

        $('btnReset').addEventListener('click', () => {
            result.manual=''; result.roll1=''; result.roll2=''; result.roll3='';
            $('manualInput').disabled=false; $('manualInput').value='';
            $('btnLock').disabled=false;
            $('btnRoll1').disabled=true; $('btnRoll2').disabled=true; $('btnRoll3').disabled=true;
            Object.values(slots).forEach(el => { el.innerText='-'; el.className='slot-box w-14 h-20 md:w-20 md:h-28 rounded flex items-center justify-center text-4xl md:text-6xl font-bold text-slate-600'; });
            const area=$('result-area'); area.classList.add('opacity-0'); setTimeout(()=>area.classList.add('hidden'),500);
            stopConfetti();
        });

        // Confetti
        let confettiRaf;
        function startConfetti() {
            const c=$('confetti-canvas'); c.style.display='block';
            const ctx=c.getContext('2d'); c.width=window.innerWidth; c.height=window.innerHeight;
            const pieces=Array.from({length:100},()=>({x:Math.random()*c.width,y:Math.random()*c.height-c.height,w:Math.random()*10+5,h:Math.random()*10+5,color:['#fde047','#38bdf8','#fb7185','#a78bfa','#4ade80'][Math.floor(Math.random()*5)],sy:Math.random()*3+2,sx:Math.random()*2-1,r:Math.random()*360,rs:Math.random()*5-2.5}));
            function draw(){ctx.clearRect(0,0,c.width,c.height);pieces.forEach(p=>{p.y+=p.sy;p.x+=p.sx;p.r+=p.rs;if(p.y>c.height){p.y=-20;p.x=Math.random()*c.width;}ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});confettiRaf=requestAnimationFrame(draw);}
            draw(); setTimeout(stopConfetti,5000);
        }
        function stopConfetti(){cancelAnimationFrame(confettiRaf);const c=$('confetti-canvas');c.getContext('2d').clearRect(0,0,c.width,c.height);c.style.display='none';}
    </script>
